<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت آگهی CS2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Vazir', Tahoma, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
        }

        h2 {
            text-align: center;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Vazir', Tahoma, sans-serif;
        }

        input[type=text],
        input[type=number],
        input[type=url],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Vazir', Tahoma, sans-serif;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-row input[type=number] {
            flex: 1;
        }

        .price-row label.toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: normal;
            white-space: nowrap;
            cursor: pointer;
            font-family: 'Vazir', Tahoma, sans-serif;
        }

        #submitBtn {
            width: 100%;
            padding: 12px;
            background: #2196F3;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Vazir', Tahoma, sans-serif;
            cursor: pointer;
            margin-top: 8px;
        }

        #submitBtn:active {
            background: #1769aa;
        }

        #submitBtn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        .form-error {
            color: #d32f2f;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <h2>ثبت آگهی آیتم‌های CS2</h2>

    <form id="adForm" novalidate>

        <!-- نوع آگهی -->
        <div class="field">
            <label>نوع آگهی</label>
            <select id="adType">
                <option value="buy">خرید</option>
                <option value="sell">فروش</option>
                <option value="trade">معاوضه</option>
            </select>
        </div>

        <!-- عنوان آگهی -->
        <div class="field">
            <label>عنوان آگهی</label>
            <input type="text" id="skinName" placeholder="عنوان آگهی خود را وارد کنید ..." required>
        </div>

        <!-- قیمت — فقط خرید و فروش -->
        <div class="field" id="priceField">
            <label id="priceLabel">قیمت مد نظر (تومان)</label>
            <div class="price-row">
                <input type="number" id="price" placeholder="مبلغ به تومان" min="0">
                <label class="toggle">
                    <input type="checkbox" id="negotiable" onchange="toggleNegotiable()"> توافقی
                </label>
            </div>
        </div>

        <!-- توضیحات -->
        <div class="field">
            <label>توضیحات</label>
            <textarea id="description" placeholder="اطلاعات اسکین‌های خود را به همراه Float و Pattern در صورت لزوم اینجا بنویسید."></textarea>
        </div>

        <!-- لینک ترید — فقط فروش و معاوضه -->
        <div class="field hidden" id="tradeLinkField">
            <label>لینک ترید</label>
            <input type="url" id="tradeLink" placeholder="https://steamcommunity.com/tradeoffer/...">
        </div>

        <p id="formError" class="form-error hidden"></p>
        <button type="button" id="submitBtn">ثبت آگهی</button>
    </form>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const formError = document.getElementById('formError');
        const submitBtn = document.getElementById('submitBtn');

        function showError(message) {
            formError.textContent = message;
            formError.classList.remove('hidden');
        }

        function hideError() {
            formError.textContent = '';
            formError.classList.add('hidden');
        }

        function setType(type) {
            const isTrade = type === 'trade';
            const isBuy = type === 'buy';
            const negotiable = document.getElementById('negotiable').checked;
            const priceInput = document.getElementById('price');
            const tradeLinkInput = document.getElementById('tradeLink');

            document.getElementById('priceField').classList.toggle('hidden', isTrade);
            document.getElementById('tradeLinkField').classList.toggle('hidden', isBuy);
            document.getElementById('priceLabel').textContent = 'قیمت کل آیتم‌ها (تومان)';

            // فیلدهای مخفی در validation مرورگر باعث block شدن submit می‌شوند
            priceInput.disabled = isTrade || negotiable;
            tradeLinkInput.disabled = isBuy;
        }

        setType('buy');

        document.getElementById('adType').addEventListener('change', function () {
            setType(this.value);
        });

        function toggleNegotiable() {
            const negotiable = document.getElementById('negotiable').checked;
            const priceInput = document.getElementById('price');
            const isTrade = document.getElementById('adType').value === 'trade';
            priceInput.disabled = negotiable || isTrade;
            if (negotiable) priceInput.value = '';
        }

        function collectData() {
            const type = document.getElementById('adType').value;
            const skinName = document.getElementById('skinName').value.trim();
            if (!skinName) {
                showError('لطفاً عنوان آگهی را وارد کنید.');
                return null;
            }

            const negotiable = document.getElementById('negotiable').checked;
            const priceVal = document.getElementById('price').value;

            const tradeLink = document.getElementById('tradeLink').value.trim();
            if ((type === 'sell' || type === 'trade') && tradeLink) {
                try {
                    new URL(tradeLink);
                } catch {
                    showError('لینک ترید معتبر نیست.');
                    return null;
                }
            }

            const data = {
                type: type,
                skin_name: skinName,
                description: document.getElementById('description').value.trim(),
            };

            if (type !== 'trade') {
                data.price = negotiable ? 'توافقی' : (priceVal || null);
            }
            if (type === 'sell' || type === 'trade') {
                data.trade_link = tradeLink;
            }

            return data;
        }

        function submitAd() {
            hideError();

            if (!tg || typeof tg.sendData !== 'function') {
                showError('لطفاً این فرم را از داخل تلگرام باز کنید.');
                return;
            }

            const data = collectData();
            if (!data) return;

            submitBtn.disabled = true;
            if (tg.MainButton) {
                tg.MainButton.showProgress(true);
            }

            try {
                tg.sendData(JSON.stringify(data));
                tg.close();
            } catch (err) {
                submitBtn.disabled = false;
                if (tg.MainButton) {
                    tg.MainButton.hideProgress();
                }
                showError('ارسال ناموفق بود. دوباره تلاش کنید.');
            }
        }

        document.getElementById('adForm').addEventListener('submit', function (e) {
            e.preventDefault();
            submitAd();
        });
        submitBtn.addEventListener('click', submitAd);

        if (tg?.MainButton) {
            tg.MainButton.setText('ثبت آگهی');
            tg.MainButton.onClick(submitAd);
            tg.MainButton.show();
            submitBtn.classList.add('hidden');
        }
    </script>
</body>

</html>
