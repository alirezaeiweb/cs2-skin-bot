<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت آگهی CS2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Vazir', Tahoma, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
        }

        h2 {
            text-align: center;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Vazir', Tahoma, sans-serif;
        }

        input[type=text],
        input[type=number],
        input[type=url],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Vazir', Tahoma, sans-serif;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-row input[type=number] {
            flex: 1;
        }

        .price-row label.toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: normal;
            white-space: nowrap;
            cursor: pointer;
            font-family: 'Vazir', Tahoma, sans-serif;
        }

        button[type=submit] {
            width: 100%;
            padding: 12px;
            background: #2196F3;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Vazir', Tahoma, sans-serif;
            cursor: pointer;
            margin-top: 8px;
        }

        button[type=submit]:active {
            background: #1769aa;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <h2>ثبت آگهی اسکین CS2</h2>

    <form id="adForm" onsubmit="submitForm(event)">

        <!-- نوع آگهی -->
        <div class="field">
            <label>نوع آگهی</label>
            <select id="adType">
                <option value="buy">خرید</option>
                <option value="sell">فروش</option>
                <option value="trade">معاوضه</option>
            </select>
        </div>

        <!-- نام اسکین -->
        <div class="field">
            <label>نام اسکین</label>
            <input type="text" id="skinName" placeholder="مثال: AK-47 | Redline" required>
        </div>

        <!-- کیفیت -->
        <div class="field">
            <label>کیفیت</label>
            <select id="quality">
                <option value="Factory New">Factory New</option>
                <option value="Minimal Wear">Minimal Wear</option>
                <option value="Field-Tested">Field-Tested</option>
                <option value="Well-Worn">Well-Worn</option>
                <option value="Battle-Scarred">Battle-Scarred</option>
            </select>
        </div>

        <!-- قیمت — فقط خرید و فروش -->
        <div class="field" id="priceField">
            <label id="priceLabel">قیمت مد نظر (تومان)</label>
            <div class="price-row">
                <input type="number" id="price" placeholder="مبلغ به تومان" min="0">
                <label class="toggle">
                    <input type="checkbox" id="negotiable" onchange="toggleNegotiable()"> توافقی
                </label>
            </div>
        </div>

        <!-- توضیحات -->
        <div class="field">
            <label>توضیحات</label>
            <textarea id="description" placeholder="توضیحات اضافه..."></textarea>
        </div>

        <!-- لینک ترید — فقط فروش و معاوضه -->
        <div class="field hidden" id="tradeLinkField">
            <label>لینک ترید</label>
            <input type="url" id="tradeLink" placeholder="https://steamcommunity.com/tradeoffer/...">
        </div>

        <button type="submit">ثبت آگهی</button>
    </form>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let currentType = 'buy';

        setType('buy');

        function setType(type) {
            currentType = type;

            document.getElementById('priceField').classList.toggle('hidden', type === 'trade');
            document.getElementById('tradeLinkField').classList.toggle('hidden', type === 'buy');
            document.getElementById('priceLabel').textContent =
                type === 'buy' ? 'قیمت مد نظر (تومان)' : 'قیمت (تومان)';
        }

        document.getElementById('adType').addEventListener('change', function () {
            setType(this.value);
        });

        function toggleNegotiable() {
            const neg = document.getElementById('negotiable').checked;
            const priceInput = document.getElementById('price');
            priceInput.disabled = neg;
            if (neg) priceInput.value = '';
        }

        function submitForm(e) {
            e.preventDefault();

            const skinName = document.getElementById('skinName').value.trim();
            if (!skinName) return;

            const negotiable = document.getElementById('negotiable').checked;
            const priceVal = document.getElementById('price').value;
            const price = negotiable ? 'توافقی' : (priceVal || null);

            const data = {
                type: currentType,
                skin_name: skinName,
                quality: document.getElementById('quality').value,
                description: document.getElementById('description').value.trim(),
            };

            if (currentType !== 'trade') data.price = price;
            if (currentType === 'sell' || currentType === 'trade') {
                data.trade_link = document.getElementById('tradeLink').value.trim();
            }

            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>

</html>
